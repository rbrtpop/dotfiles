# ── Plugins ──────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'christoomey/vim-tmux-navigator'

# ── Theme ────────────────────────────────────────────────
set -g @catppuccin_flavor 'mocha'

# Window status style
set -g @catppuccin_window_status_enable "yes"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_current_fill "number"

# Show window name AND running program
set -g @catppuccin_window_current_text " #W | #{pane_current_command}"
set -g @catppuccin_window_text " #W | #{pane_current_command}"

# ── Status Bar ───────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-interval 1
set -g status-left-length 200
set -g status-right-length 200

# Left: Application | Session | Current Command
set -g status-left "#{E:@catppuccin_status_session}"
set -ag status-left "#{E:@catppuccin_status_application}"

# Right: CPU | Session | Uptime | Battery | Time
set -gF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -ag status-right '#[bg=#45475a,fg=#cdd6f4] %H:%M %d/%b/%y'

# ── Basic Settings ───────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set-option -g allow-rename off

# Prefix: Ctrl-Space
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Bindings ─────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
bind H split-window -h -c "#{pane_current_path}"
bind V split-window -v -c "#{pane_current_path}"

# Pane navigation handled by vim-tmux-navigator plugin


unbind '"'
unbind %

# Session switcher
bind S display-popup -E "\
    tmux list-sessions -F '#{?session_attached,,#{session_name}}' |\
    sed '/^$/d' |\
    fzf --reverse --header jump-to-session --preview 'tmux capture-pane -pt {}' |\
    xargs tmux switch-client -t"

# Window switcher
bind s display-popup -E "\
    tmux list-windows -a -F '#S:#W' |\
    sed '/^$/d' |\
    fzf --reverse --header jump-to-window --preview 'tmux capture-pane -pt {}' |\
    xargs tmux switch-client -t"

# New session and new window, or switch to existin session
bind N command-prompt -p "Session name" {
  if-shell "tmux has-session -t '=%%' 2>/dev/null" {
    switch-client -t "=%%"
  } {
    command-prompt -p "First window name" {
      new-session -d -c "#{pane_current_path}" -s "%1" -n "%%"
      switch-client -t "=%1"
    }
  }
}

# New window in current session
bind W command-prompt -p "Window name" {
  if-shell "tmux list-windows -F '#{window_name}' | grep -Fxq -- '%%'" {
    select-window -t "%%"
  } {
    new-window -c "#{pane_current_path}" -n "%%"
  }
}

# ── Continuum ────────────────────────────────────────────
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# ── Initialize TPM ───────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'

# run '~/.tmux/plugins/tmux/catppuccin.tmux'
# run '~/.tmux/plugins/tmux-cpu/cpu.tmux'
# run '~/.tmux/plugins/tmux-battery/battery.tmux'
